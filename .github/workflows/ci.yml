name: AI War CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # Job 1: Lint & Type Check
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint
        continue-on-error: true

      - name: Type check
        run: npx tsc --noEmit
        continue-on-error: true

  # Job 2: Build Test
  build:
    name: Build Test
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Create .env.local for build
        run: |
          cat > .env.local << EOF
          NEXT_PUBLIC_USE_MOCK=true
          NEXT_PUBLIC_FIREBASE_API_KEY=mock-api-key
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=mock-project.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID=mock-project
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=mock-project.appspot.com
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=123456789012
          NEXT_PUBLIC_FIREBASE_APP_ID=1:123456789012:web:mock-app-id
          NEXT_PUBLIC_FIREBASE_DATABASE_URL=https://mock-project-default-rtdb.firebaseio.com
          EOF

      - name: Build project
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: frontend/.next
          retention-days: 7

  # Job 3: E2E Tests (Optional - Continue on Error)
  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Create .env.local for tests
        run: |
          cat > .env.local << EOF
          NEXT_PUBLIC_USE_MOCK=true
          NEXT_PUBLIC_FIREBASE_API_KEY=mock-api-key
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=mock-project.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID=mock-project
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=mock-project.appspot.com
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=123456789012
          NEXT_PUBLIC_FIREBASE_APP_ID=1:123456789012:web:mock-app-id
          NEXT_PUBLIC_FIREBASE_DATABASE_URL=https://mock-project-default-rtdb.firebaseio.com
          EOF

      - name: Run Playwright tests
        run: npm run test
        continue-on-error: true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30

  # Job 4: Deploy to Firebase Hosting (Optional - Manual Trigger)
  deploy:
    name: Deploy to Firebase Hosting
    runs-on: ubuntu-latest
    needs: [build, e2e-tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Create .env.production
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}
        run: |
          cat > .env.production << EOF
          NEXT_PUBLIC_FIREBASE_API_KEY=${FIREBASE_API_KEY}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${FIREBASE_AUTH_DOMAIN}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${FIREBASE_STORAGE_BUCKET}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${FIREBASE_MESSAGING_SENDER_ID}
          NEXT_PUBLIC_FIREBASE_APP_ID=${FIREBASE_APP_ID}
          NEXT_PUBLIC_FIREBASE_DATABASE_URL=${FIREBASE_DATABASE_URL}
          EOF

      - name: Build for production
        run: npm run build:prod

      - name: Deploy to Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: aiwar-14246
          entryPoint: ./frontend
